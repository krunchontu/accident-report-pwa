    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SG Accident Kaki",
      "description": "Free motor vehicle accident documentation app for Singapore drivers. Guided photo capture, GIA eligibility checks, deadline tracking, and PDF export.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "SGD"
      },
      "availableOnDevice": "Mobile, Desktop",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "countryOfOrigin": {
        "@type": "Country",
        "name": "Singapore"
      }
    }
    </script>

    <!-- Structured Data: FAQPage (targets Google rich snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the 24-hour rule for accident reporting in Singapore?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "In Singapore, you must file a Singapore Accident Statement (SAS) with your insurer within 24 hours of a motor vehicle accident, even if you are not at fault. Failure to do so may affect your insurance claim."
          }
        },
        {
          "@type": "Question",
          "name": "What should I do immediately after a car accident in Singapore?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Check for injuries and call 995 (ambulance) or 999 (police) if needed. Exchange particulars with the other driver, take photos of the scene, vehicle damage, and road conditions. Use the SG Accident Kaki app to document everything step by step."
          }
        },
        {
          "@type": "Question",
          "name": "What is GIA and how does it affect my accident claim?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "GIA (General Insurance Association of Singapore) manages motor accident claims. If your accident meets GIA eligibility criteria, you can claim through an approved workshop. SG Accident Kaki includes a 27-rule eligibility checker to help you assess your claim."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use SG Accident Kaki offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. SG Accident Kaki is a Progressive Web App (PWA) that works fully offline. All data is stored locally on your device. You can document an accident even without internet and export or share your report later."
          }
        }
      ]
    }
    </script>

    <title>SG Accident Kaki — Free Accident Report App for Singapore Drivers</title>
