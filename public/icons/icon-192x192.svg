<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#2E4A7A"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="checkBg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background with gradient -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Subtle border highlight -->
  <rect width="186" height="186" x="3" y="3" rx="39" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="2"/>

  <!-- Shield shape - protection & safety -->
  <path d="M96 28 L148 54 L148 102 C148 132 124 154 96 164 C68 154 44 132 44 102 L44 54 Z"
        fill="url(#shieldFill)"/>
  <path d="M96 28 L148 54 L148 102 C148 132 124 154 96 164 C68 154 44 132 44 102 L44 54 Z"
        fill="none" stroke="white" stroke-width="4" stroke-linejoin="round" opacity="0.85"/>

  <!-- Clipboard/report document -->
  <g filter="url(#shadow)">
    <rect x="74" y="56" width="44" height="54" rx="4" fill="white" fill-opacity="0.12" stroke="white" stroke-width="3" opacity="0.85"/>
    <!-- Clipboard top clip -->
    <rect x="84" y="50" width="24" height="14" rx="3" fill="white" opacity="0.85"/>
    <rect x="90" y="48" width="12" height="6" rx="2" fill="#1B2A4A" opacity="0.6"/>
  </g>

  <!-- Document content lines -->
  <line x1="83" y1="78" x2="109" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="83" y1="86" x2="105" y2="86" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="83" y1="94" x2="100" y2="94" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="83" y1="102" x2="96" y2="102" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>

  <!-- Green checkmark badge - completion/verified -->
  <g filter="url(#shadow)">
    <circle cx="124" cy="128" r="18" fill="url(#checkBg)"/>
    <circle cx="124" cy="128" r="16" fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
    <path d="M115 128 L121 134 L133 120" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small car silhouette accent at bottom -->
  <g opacity="0.35" transform="translate(56, 140)">
    <path d="M12 8 L16 2 L28 2 L32 8 L36 8 C38 8 38 12 36 12 L8 12 C6 12 6 8 8 8 Z" fill="white"/>
    <circle cx="14" cy="13" r="2.5" fill="white"/>
    <circle cx="30" cy="13" r="2.5" fill="white"/>
  </g>
</svg>
