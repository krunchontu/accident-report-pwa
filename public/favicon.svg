<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B2A4A"/>
      <stop offset="100%" stop-color="#2E4A7A"/>
    </linearGradient>
    <linearGradient id="shield" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E8F0" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <rect width="60" height="60" x="2" y="2" rx="12" fill="none" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Shield shape - protection/safety symbol -->
  <path d="M32 10 L48 18 L48 34 C48 44 40 51 32 54 C24 51 16 44 16 34 L16 18 Z"
        fill="url(#shield)" opacity="0.15"/>
  <path d="M32 10 L48 18 L48 34 C48 44 40 51 32 54 C24 51 16 44 16 34 L16 18 Z"
        fill="none" stroke="white" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>
  <!-- Clipboard/document icon inside shield -->
  <rect x="26" y="20" width="12" height="15" rx="1.5" fill="none" stroke="white" stroke-width="1.4" opacity="0.85"/>
  <rect x="29" y="18" width="6" height="4" rx="1" fill="white" opacity="0.85"/>
  <!-- Document lines -->
  <line x1="29" y1="27" x2="37" y2="27" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="29" y1="30" x2="35" y2="30" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="29" y1="33" x2="33" y2="33" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Checkmark at bottom right of shield -->
  <circle cx="40" cy="42" r="6" fill="#2E7D32"/>
  <path d="M37 42 L39.5 44.5 L43 39.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
